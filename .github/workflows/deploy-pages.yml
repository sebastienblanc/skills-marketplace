name: Update Skills Marketplace

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    name: Regenerate skills.json and commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate skills.json
        run: python scripts/generate_skills_json.py

      - name: Validate skills.json
        run: |
          python - <<'EOF'
          import json, sys
          with open("docs/skills.json") as f:
              skills = json.load(f)
          assert isinstance(skills, list), "skills.json must be a JSON array"
          for s in skills:
              assert "name" in s, f"Missing 'name' in {s}"
              assert "description" in s, f"Missing 'description' in {s}"
          print(f"✅ Validated {len(skills)} skill(s)")
          EOF

      - name: Commit updated skills.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/skills.json
          git diff --cached --quiet || git commit -m "chore(marketplace): regenerate skills.json [skip ci]"
          git push
